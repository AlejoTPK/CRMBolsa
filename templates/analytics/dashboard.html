<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Analytics CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #212529; color: white; padding-top: 20px; }
        .nav-link { color: #adb5bd; cursor: pointer; }
        .nav-link:hover { color: white; background: #343a40; }
        .card { border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar shadow">
            <div class="position-sticky">
                <h5 class="px-3 mb-4">📊 Analytics CRM</h5>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" onclick="loadChart('GC=F')">🟡 Gold (GC=F)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="loadChart('CL=F')">🛢️ Crude Oil (CL=F)</a>
                    </li>
                </ul>
                <hr>
                <div class="px-3 small text-muted">Estudiante: {{ user.username|default:"Geronimo" }}</div>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Dashboard de Commodities</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="location.reload()">🔄 Actualizar</button>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card shadow-sm p-4">
                        <div id="chart-loader" class="text-center d-none">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                        <div id="main-chart" style="height: 600px;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    async function loadChart(symbol) {
        document.getElementById('chart-loader').classList.remove('d-none');
        
        try {
            const response = await fetch(`/api/prices/${symbol}/`);
            const json = await response.json();
            const data = json.data;

            if (data.length === 0) {
                alert("No hay datos disponibles para este símbolo. ¿Ya corriste fetch_market_data?");
                return;
            }

            // Configuración del gráfico de Velas (Candlestick)
            const trace1 = {
                x: data.map(d => d.timestamp),
                close: data.map(d => d.close_price),
                high: data.map(d => d.high_price),
                low: data.map(d => d.low_price),
                open: data.map(d => d.open_price),
                type: 'candlestick',
                name: symbol,
                increasing: {line: {color: '#26a69a'}},
                decreasing: {line: {color: '#ef5350'}}
            };

            // Promedio Móvil (SMA 50)
            const trace2 = {
                x: data.map(d => d.timestamp),
                y: data.map(d => d.SMA_50),
                type: 'scatter',
                mode: 'lines',
                name: 'SMA 50',
                line: {color: 'rgba(33, 150, 243, 0.7)', width: 2}
            };

            const layout = {
                title: `Análisis Técnico: ${symbol}`,
                dragmode: 'zoom',
                showlegend: true,
                xaxis: { 
                    rangeslider: { visible: false },
                    title: 'Fecha'
                },
                yaxis: { title: 'Precio (USD)' },
                template: 'plotly_white'
            };

            Plotly.newPlot('main-chart', [trace1, trace2], layout);
        } catch (error) {
            console.error("Error cargando el gráfico:", error);
        } finally {
            document.getElementById('chart-loader').classList.add('d-none');
        }
    }

    // Cargar Oro por defecto al iniciar
    window.onload = () => loadChart('GC=F');
</script>

</body>
</html>
